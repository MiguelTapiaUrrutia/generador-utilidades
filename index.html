<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Utilidades</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/app.js" defer></script>
</head>
<body>
  <header>
    <h1>Generador de Utilidades</h1>
  </header>

  <main>
    <section id="lorem-ipsum" aria-labelledby="lorem-ipsum-titulo">
      <h2 id="lorem-ipsum-titulo">Lorem Ipsum</h2>
      <div class="controles">
        <label for="num-parrafos">Número de párrafos</label>
        <input type="number" id="num-parrafos" min="1" max="10" value="3">
        <button type="button" id="btn-lorem">Generar</button>
      </div>
      <div id="resultado-lorem" aria-live="polite"></div>
      <button type="button" id="btn-copiar-lorem" hidden>Copiar</button>
    </section>

    <section id="emails-prueba" aria-labelledby="emails-prueba-titulo">
      <h2 id="emails-prueba-titulo">Emails de prueba</h2>
    </section>

    <section id="contrasenas" aria-labelledby="contrasenas-titulo">
      <h2 id="contrasenas-titulo">Contraseñas</h2>
    </section>
  </main>

  <footer>
    <p>Generador de Utilidades — en desarrollo</p>
  </footer>
</body>
</html>
